<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en-us">
{% include head.html %}

<body>
  <div class="container content">
    <div class="masthead">
      <h3 class="masthead-title">
        <a href="/" title="Home">{{ site.title }}</a>

        {% for page in site.pages_list %} &nbsp;&nbsp;&nbsp;<small><a href="{{ page[1]  }}">{{ page[0] }}</a></small>
        {% endfor %}
      </h3>
    </div>

    {{ content }}

    <br />

    <div class="footer" style="font-size: smaller;">
      <p>
        &copy; {{ site.time | date: '%Y' }}

        <!-- <span id='emoji'></span>  -->

        Daniel Oscar Denenberg.
      </p>
    </div>
    <script>
      let emojiStringToArray = function (str) {
        split = str.split(/([\uD800-\uDBFF][\uDC00-\uDFFF])/);
        arr = [];
        for (var i = 0; i < split.length; i++) {
          char = split[i]
          if (char !== "") {
            arr.push(char);
          }
        }
        return arr;
      };

      function getEmoji() {
        let emojis = emojiStringToArray('🌎🦕🦖🐔🐧🐳🐬🐃🦒🌴🌲🌺☔️🍇')
        let index = parseInt(Math.random() * emojis.length - 1);
        return emojis[index];
      }

      function putEmojiInSpan(emoji) {
        let span = document.getElementById('emoji');
        span.innerHTML = emoji;
      }

      putEmojiInSpan(getEmoji());
    </script>
  </div>
</body>

</html>
