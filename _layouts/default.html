<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en-us">
{% include head.html %}

<body>
  <div class="container content">
    <div class="masthead">
      <h3 class="masthead-title">
        <a href="/" title="Home">{{ site.title }}</a>

        {% for page in site.pages_list %} &nbsp;&nbsp;&nbsp;<small><a href="{{ page[1]  }}">{{ page[0] }}</a></small>
        {% endfor %}
      </h3>
    </div>

    {{ content }}

    <div class="footer">
      <p>
        &copy; {{ site.time | date: '%Y' }}. 🐫 All rights reserved.
      </p>
    </div>
  </div>
  <script>
    function makeHeaderHashes() {
      let things = document.querySelectorAll(
        '.post > h2,.post > h3,.post > h4,.post > h5,.post > h6,.page > h2,.page > h3,.page > h4,.page > h5,.page > h6'
      );
      things.forEach(thing => {
        let tagName = thing.tagName;
        let num = parseInt(tagName[1]);

        let hashes = (() => {
          let t = "";
          for (let i = 0; i < num; i++) {
            t += "#";
          }
          return t;
        })();

        var hash = document.createElement(tagName);
        hash.innerHTML = hashes;
        hash.id = "header-hash";

        thing.insertAdjacentElement("beforebegin", hash)
      });
    }
    makeHeaderHashes();
  </script>
</body>

</html>
